<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Dicee</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster" rel="stylesheet">

  </head>
  <body>
    <div class="container">
      <h1>🎲 Dicee Game 🎲</h1>
      
      <div class="score-board">
        <div class="score-section">
          <p class="player-name">Player 1</p>
          <p class="score" id="score1">0</p>
        </div>
        <div class="score-section">
          <p class="player-name">Player 2</p>
          <p class="score" id="score2">0</p>
        </div>
      </div>

      <div class="dice-container">
        <div class="dice">
          <p>Player 1</p>
          <img class="img1" src="images/dice6.png" alt="Player 1 dice">
        </div>

        <div class="dice">
          <p>Player 2</p>
          <img class="img2" src="images/dice6.png" alt="Player 2 dice">
        </div>
      </div>

      <div class="result">
        <h2 id="result-message">Press Roll or Space to Begin!</h2>
      </div>

      <div class="controls">
        <button class="roll-btn" id="rollBtn">🎲 Roll Dice</button>
        <button class="reset-btn" id="resetBtn">🔄 Reset Score</button>
      </div>
    </div>

    <script src="index.js" charset="utf-8"></script>
    <footer>
      Made By Anil Singh ❤️
    </footer>
  </body>
</html>
